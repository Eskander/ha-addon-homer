name: Release

on:
  workflow_run:
    workflows: ["Dependabot Auto-Merge"]
    types:
      - completed

env:
  WATCH_PACKAGE: "bastienwirtz/homer"

jobs:
  validate-package:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check-package.outputs.should_run }}

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - uses: dependabot/fetch-metadata@v2
        id: dependabot-metadata
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Check Package
        id: check-package
        env:
          PACKAGE_DEPENDENCY: ${{ steps.dependabot-metadata.outputs.dependency-name }}
        run: |
          FULL_PACKAGE="${{ env.WATCH_PACKAGE }}"
          echo "Watching package: $FULL_PACKAGE"
          echo "Dependabot updated: $PACKAGE_DEPENDENCY"
          
          if [[ "$PACKAGE_DEPENDENCY" == "$FULL_PACKAGE" ]]; then
            echo "Package matches. Proceeding with workflow."
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "Package does not match. Skipping workflow."
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  version-bump:
    needs: validate-package
    if: needs.validate-package.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      addon_version: ${{ steps.extract.outputs.addon_version }}

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - uses: dependabot/fetch-metadata@v2
        id: dependabot-metadata
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Extract versions and package info
        id: extract
        env:
          DEPENDABOT_VERSION: ${{ steps.dependabot-metadata.outputs.new-version }}
        run: |
          # Extract current version from config.yaml
          CURRENT_VERSION=$(grep "version:" src/config.yaml | sed 's/.*: "\(.*\)"/\1/')
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          
          # Calculate new version (bump minor)
          MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
          NEW_MINOR=$((MINOR + 1))
          ADDON_VERSION="$MAJOR.$NEW_MINOR"
          echo "addon_version=$ADDON_VERSION" >> $GITHUB_OUTPUT
          
          # Use the package version from dependabot metadata
          echo "dependabot_version=$DEPENDABOT_VERSION" >> $GITHUB_OUTPUT

      - name: Update version in config.yaml
        run: |
          sed -i 's/version: ".*"/version: "${{ steps.extract.outputs.addon_version }}"/' src/config.yaml

      - name: Update CHANGELOG.md
        env:
          ADDON_VERSION: ${{ steps.extract.outputs.addon_version }}
          DEPENDABOT_VERSION: ${{ steps.extract.outputs.dependabot_version }}
        run: |
          # Prepare new entry with the specified format
          NEW_ENTRY="# ${ADDON_VERSION}\n- Update ${WATCH_PACKAGE} to ${DEPENDABOT_VERSION}\n"
          
          # Prepend new entry to CHANGELOG.md
          echo -e "$NEW_ENTRY$(cat src/CHANGELOG.md)" > src/CHANGELOG.md

      - name: Setup GitHub CLI
        run: |
          gh auth login --with-token <<< "${{ secrets.GITHUB_TOKEN }}"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Commit and push changes
        run: |
          git add src/config.yaml src/CHANGELOG.md
          git commit -m "Bump version to ${{ steps.extract.outputs.addon_version }}"
          git push

  create-pr:
    needs: version-bump
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          ref: main

      - name: Setup GitHub CLI
        run: gh auth login --with-token <<< "${{ secrets.GITHUB_TOKEN }}"

      - name: Get commit list
        id: get-commits
        run: |
          # Fetch release branch
          git fetch origin release:release --no-tags
          
          # Get the last commit that was merged to release
          LAST_RELEASE_COMMIT=$(git merge-base main release)
          
          # Get all commits between last release and current main
          COMMITS=$(git log --pretty=format:"- %s (%h)" $LAST_RELEASE_COMMIT..main)
          
          # Properly handle multiline output for GitHub Actions
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "commits<<$EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ADDON_VERSION: ${{ needs.version-bump.outputs.addon_version }}
        run: |
          PR_URL=$(gh pr create \
            --base release \
            --head main \
            --title "Update $ADDON_VERSION" \
            --body "This PR updates the release branch to version $ADDON_VERSION.
            
            ## Commits included in this release:
            ${{ steps.get-commits.outputs.commits }}" \
            --reviewer "Eskander" \
            --assignee "Eskander")
          
          echo "Created PR: $PR_URL"
