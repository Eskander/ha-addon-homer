name: Create PR
on:
  push:
    branches:
      - main
    paths:
      - 'src/config.yaml'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from config
        id: get-version
        run: |
          VERSION=$(grep "version:" src/config.yaml | cut -d '"' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get commit list
        id: get-commits
        run: |
          # Get the last commit that was merged to release
          LAST_RELEASE_COMMIT=$(git merge-base main release)
          
          # Get all commits between last release and current main
          COMMITS=$(git log --pretty=format:"- %s (%h)" $LAST_RELEASE_COMMIT..main)
          
          # Properly handle multiline output for GitHub Actions
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "commits<<$EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        uses: repo-sync/pull-request@v2
        with:
          source_branch: "main"
          destination_branch: "release"
          pr_title: "Update ${{ steps.get-version.outputs.version }}"
          pr_body: |
            This PR updates the release branch to version ${{ steps.get-version.outputs.version }}.
            
            ## Commits included in this release:
            ${{ steps.get-commits.outputs.commits }}
            
          github_token: ${{ secrets.GITHUB_TOKEN }}
          pr_reviewer: "Eskander"
